# contains the model specific configuration parameters for training
name: "resnet_vanilla"

training:
  n_steps: 1000
  output_every: null
  checkpoint_every: null
  eval_every: null
  optimization:
    optimizer:
      learning_rate: 0.0001
    #TODO differentiate between different losses?
    gradient_clipping:
      clip_by_value: null
      clip_by_norm: null
      clip_by_global_norm: 10.0

dset:
  training:
    general:
      n_noise: 3
      is_eval: False
    delta_loss:
      # for the delta loss, this is multiplied by 1 + 2 * n_params
      local_batch_size: 4
      is_cached: False
      n_readers: 4
      n_prefetch: 2
      file_name_shuffle_buffer: 64
      examples_shuffle_buffer: 16
    grid_loss:
      local_batch_size: 32
      n_readers: 4
      n_prefetch: 2
      file_name_shuffle_buffer: 64
      examples_shuffle_buffer: 128
  eval:
    fiducial:
      n_noise: 1
      local_batch_size: 44
      is_cached: False
      n_readers: 4
      n_prefetch: null
      is_eval: True
    grid:
      n_noise: 3
      local_batch_size: 44
      n_readers: 4
      n_prefetch: null

model:
  name: resnet
  n_neighbors: 20
  max_checkpoints: 10
  save_second_to_last_layer: True
  kwargs:
    n_base_channels: 32
    # depth
    n_downsampling: 3
    n_cheby: 2
    n_residuals: 5
    # misc
    poly_degree: 5
