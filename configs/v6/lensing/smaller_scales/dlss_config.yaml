# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: True
    with_clustering: False
    apply_norm: True
  training:
    params: [Om, s8, w0, Aia, n_Aia]
  eval:
    fiducial:
      params: []
    grid:
      params: [Om, s8, w0, Aia, n_Aia]

scale_cuts:
  null
  # n_sigma_support: 3
  # arcmin: True
  # lensing:
  #   # 4 Mpc/h transverse comoving scale -> arcmin
  #   theta_fwhm: [14.9, 10.2, 7.7, 6.5]
  # clustering:
  #   # 16 Mpc/h transverse comoving scale -> arcmin
  #   theta_fwhm: [65.1, 44.5, 34.1, 28.5]

# TODO should these parameters also be included with the hyperparameters to be tuned?
delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_weight: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1.0e-16
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False
