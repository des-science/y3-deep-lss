# contains the general, non model specific configuration parameters of the analysis
training:
  target_params: ["Om"]
  delta_loss:
    # regularization
    force_params_value: 0.0
    force_params_weight: 1.0
    jac_weight: 100.0
    jac_cond_weight: null
    cov_weight: False
    # numerical stability
    use_log_det: True
    tikhonov_regu: False
    eps: 1.0e-32

networks:
  # allowed values are 8, 20, 40 and 60. From HealpyGCNN class
  n_neighbors: 20

gp_abc:
  # kernel min value, Note: for float32 this is pretty close to the min logable val
  kernel_min_val: 1.0e-42
