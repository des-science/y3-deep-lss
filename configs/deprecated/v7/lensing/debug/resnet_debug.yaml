# contains the model specific configuration parameters for training and hyperparameter optimization
name: resnet_vanilla

training:
  n_steps: 10000
  output_every: Null
  checkpoint_every: Null
  eval_every: Null

optimization:
  optimizer: adam
  optimizer_kwargs:
    learning_rate: 0.001
  gradient_clipping:
    clip_by_value: null
    clip_by_norm: null
    clip_by_global_norm: 1.0

network:
  name: resnet
  n_neighbors: 20
  max_checkpoints: 10
  save_second_to_last_layer: True
  kwargs:
    n_base_channels: 32
    # depth
    n_downsampling: 3
    n_cheby: 2
    n_residuals: 5
    # misc
    poly_degree: 5

dset:
  training:
    common:
      is_eval: False
      n_noise: 3
      n_readers: 4
      n_prefetch: null
    # FiducialPipeline
    delta_loss:
      # because of the derivatives, this is multiplied by 1 + 2 * n_params
      local_batch_size: 16
      file_name_shuffle_buffer: 64
      examples_shuffle_buffer: 64
      is_cached: False
    # GridPipeline
    likelihood_loss:
      local_batch_size: 32
      file_name_shuffle_buffer: 64
      examples_shuffle_buffer: 128
  eval:
    common:
      is_eval: True
      local_batch_size: 32
      n_readers: 4
      n_prefetch: 1
    fiducial:
      n_noise: 1
      is_cached: False
    grid:
      n_noise: 3
