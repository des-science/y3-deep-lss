# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: False
    with_clustering: True
    apply_norm: True
  training:
    params: [Om, s8, w0, bg, n_bg]
  eval:
    fiducial:
      params: []
    grid:
      params: [Om, s8, w0, bg, n_bg]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 6 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [22.1, 15.1, 11.2, 9.4]
    # white_noise_sigma: [0.51520719, 0.35428238, 0.27699105, 0.26566648]
    white_noise_sigma: [0.12516133, 0.08745182, 0.05437602, 0.09995155]
  clustering:
    # 16 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [65.1, 44.5, 34.1, 28.5]
    # white_noise_sigma: [1.62299023, 0.81909851, 0.64732432, 0.73886103]
    white_noise_sigma: [0.26904975, 0.14492357, 0.11769442, 0.12976879]


# TODO should these parameters also be included with the hyperparameters to be tuned?
delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_loss: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1.0e-32
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False
