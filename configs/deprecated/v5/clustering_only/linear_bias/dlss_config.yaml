# contains the general, non model specific configuration parameters of the analysis
dset:
  general:
    with_lensing: False
    with_clustering: True
    apply_norm: True
  training:
    params: ["Om", "s8", "bg", "n_bg"]
  eval:
    fiducial:
      params: []
    grid:
      params: ["Om", "s8", "bg", "n_bg"]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 6 Mpc/h transverse comoving scale
    theta_fwhm: [22.1, 15.1, 11.2, 9.4]
  clustering:
    # 16 Mpc/h transverse comoving scale
    theta_fwhm: [65.1, 44.5, 34.1, 28.5]

delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_weight: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1.0e-32
